<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo - Game Play</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-purple: #4a148c;
            --accent-gold: #ffd700;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-purple);
            color: var(--white);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
        }

        .stat-box b { color: var(--accent-gold); display: block; font-size: 14px; }

        .game-container {
            display: flex;
            flex-direction: row; /* ለጎን ለጎን አቀማመጥ */
            gap: 15px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        /* የጠሩት ቁጥሮች ዝርዝር (ግራ በኩል) */
        .called-numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: #311b92;
            padding: 5px;
            border-radius: 5px;
        }

        .num-dot {
            width: 25px;
            height: 25px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #5e35b1;
        }

        .num-dot.active {
            background: var(--accent-gold);
            color: #000;
            font-weight: bold;
        }

        /* የቢንጎ ካርቴላ (ቀኝ በኩል) */
        .bingo-card {
            background: var(--white);
            color: #000;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        table { border-collapse: collapse; width: 100%; }
        th { color: #d32f2f; font-size: 20px; padding: 5px; }
        td {
            border: 2px solid #ddd;
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 18px;
            font-weight: bold; /* Bold numbers */
            cursor: pointer;
        }

        td.marked {
            background-color: #4caf50;
            color: white;
            border-radius: 50%;
        }

        .bingo-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent-gold);
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            display: none; /* መስመር ሲሞላ ብቻ ነው የሚመጣው */
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">Win<b id="win-amount">0.00</b></div>
        <div class="stat-box">Stake<b id="current-stake">10</b></div>
        <div class="stat-box">Call<b id="last-call">-</b></div>
        <div class="stat-box">Wallet<b id="wallet-balance">0.00</b></div>
    </div>

    <div class="game-container">
        <div class="called-numbers-grid" id="number-board">
            </div>

        <div class="bingo-card">
            <h3 style="text-align:center; margin:0 0 5px 0; font-size:12px;">Card No: <span id="card-id">108</span></h3>
            <table>
                <thead>
                    <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
                </thead>
                <tbody id="card-body">
                    </tbody>
            </table>
        </div>
    </div>

    <button id="bingo-button" class="bingo-btn" onclick="claimWin()">BINGO!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let walletBalance = 0;
        let cardNumbers = [];
        let markedNumbers = new Set();

        // 1. ካርቴላ መፍጠር (No Duplicates)
        function generateCard() {
            const ranges = [
                [1,15], [16,30], [31,45], [46,60], [61,75]
            ];
            let card = [[],[],[],[],[]];

            for(let i=0; i<5; i++) {
                let pool = Array.from({length: 15}, (_, n) => n + ranges[i][0]);
                for(let j=0; j<5; j++) {
                    let idx = Math.floor(Math.random() * pool.length);
                    card[j][i] = pool.splice(idx, 1)[0];
                }
            }
            card[2][2] = "⭐"; // Free Space
            return card;
        }

        // 2. ካርቴላውን በገጹ ላይ ማሳየት
        function displayCard() {
            const tbody = document.getElementById('card-body');
            const card = generateCard();
            tbody.innerHTML = '';
            
            card.forEach((row, rIdx) => {
                let tr = document.createElement('tr');
                row.forEach((num, cIdx) => {
                    let td = document.createElement('td');
                    td.innerText = num;
                    if(num === "⭐") td.classList.add('marked');
                    td.onclick = () => markNumber(td, num);
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        // 3. ቁጥሮችን ምልክት ማድረግ
        function markNumber(element, num) {
            // እዚህ ጋር ቁጥሩ የተጠራ መሆኑን ቼክ የሚያደርግ logic ይገባል
            element.classList.toggle('marked');
            checkBingo();
        }

        // 4. ቢንጎ መኖሩን ማረጋገጥ
        function checkBingo() {
            // Rows, Columns, Diagonals logic እዚህ ጋር ይሰራል።
            // መስመር ከሞላ፡
            document.getElementById('bingo-button').style.display = 'block';
        }

        // 5. Wallet ማመሳሰል (ከቦቱ ጋር)
        function syncWallet() {
            // ቦቱ ሲከፈት የላከውን ዳታ ማንበብ
            const user = tg.initDataUnsafe.user;
            if(user) {
                // በ API በኩል ባላንሱን መሳብ ይቻላል
                document.getElementById('wallet-balance').innerText = "0.00 ETB";
            }
        }

        // ጨዋታውን ማስጀመር
        window.onload = () => {
            syncWallet();
            displayCard();
            
            // የቁጥሮች ሰሌዳ መፍጠር
            const board = document.getElementById('number-board');
            for(let i=1; i<=75; i++) {
                let dot = document.createElement('div');
                dot.className = 'num-dot';
                dot.id = 'call-' + i;
                dot.innerText = i;
                board.appendChild(dot);
            }
        };

        function claimWin() {
            alert("እንኳን ደስ አለዎት! አሸንፈዋል!");
            tg.close();
        }
    </script>
</body>
</html>
