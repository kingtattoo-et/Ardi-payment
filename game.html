<!DOCTYPE html>
<html>
<head>
  <title>Ardi Bingo Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* የimage_2.png የጨዋታ ስታይል እዚህ ጋር ጨምር */
  </style>
</head>
<body>

  <div id="stake_page">
    <h2>Stake (ዳር ማስያዝ)</h2>
    <input type="number" id="stake_amount" placeholder="Stake Amount">
    <button onclick="confirmStake()">Confirm Stake</button>
  </div>

  <div id="game_page" style="display: none;">
    <h2>Game Area</h2>
    <div id="countdown">60</div> </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // አፑን ሙሉ ስክሪን እንዲሆን

    // ቆጠራውን ለማስጀመር
    function startCountdown() {
      var time = 60;
      var countdown = document.getElementById("countdown");
      
      var timer = setInterval(function() {
        if (time == 0) {
          clearInterval(timer);
          // ቆጠራው ሲያልቅ ወደ ጨዋታው ገጽ (image_3.png) ቀጥታ ይወስዳል
          document.getElementById("stake_page").style.display = "none";
          document.getElementById("game_page").style.display = "block";
          // የቢንጎ ጨዋታውን እዚህ ጋር ጀምር
        }
        countdown.innerHTML = time;
        time--;
      }, 1000);
    }

    // የዳር ማስያዣውን ለማረጋገጥ
    function confirmStake() {
      // ተጠቃሚው ያስገባውን ዳር (stake amount) ለማግኘት
      var stakeAmount = document.getElementById("stake_amount").value;
      
      // የሂሳብ ስሌት፡ derash = (stakeAmount * 0.85 * selected_cards)
      // selected_cards የሚለውን ከቢንጎ ጨዋታው ማግኘት አለብህ
      var selectedCards = 1; // ይህንን በጨዋታህ መሰረት ቀይረው
      var derash = (stakeAmount * 0.85 * selectedCards).toFixed(2);
      
      // ተጠቃሚው ያስገባውን ዳር እና ደራሹን በቴሌግራም ቦት መላክ ትችላለህ
      // ይህንን በ API በኩል ማድረግ ይቻላል

      // ቆጠራውን ጀምር
      startCountdown();
    }
  </script>
</body>
</html>
