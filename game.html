<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardi Bingo - Cartela</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header Info Bar */
        .info-bar { display: flex; justify-content: space-around; width: 100%; background: #fff; padding: 10px 0; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 12px; font-weight: bold; text-align: center; }
        .info-item { display: flex; flex-direction: column; }
        .info-value { color: #6a1b9a; font-size: 14px; }
        .timer-val { color: red; }

        /* Stake Input Area */
        .stake-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 5px; width: 80px; }

        /* Grid System */
        .grid-container { background-color: #6a1b9a; padding: 15px; border-radius: 15px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; width: 100%; max-width: 380px; }
        .num-btn { background-color: #e67e22; color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border: none; font-weight: bold; }
        .num-btn.selected { background-color: #2ecc71; border: 2px solid white; }

        /* Modal / Card Popup (Image 2 Style) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .card-view { background: #f9c35d; width: 280px; border-radius: 15px; padding: 15px; position: relative; text-align: center; border: 4px solid #fff; }
        .bingo-header { display: flex; justify-content: space-between; font-weight: bold; color: #d32f2f; font-size: 20px; margin-bottom: 5px; }
        .card-grid-small { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #fff; padding: 5px; border-radius: 5px; }
        .cell { border: 1px solid #ccc; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .cell.star { color: #2ecc71; font-size: 20px; }
        .modal-btns { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-accept { background: #2ecc71; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; }
        .btn-cancel { background: #e67e22; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        #derash-box { margin-top: 10px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="info-item">Game ID <span class="info-value" id="gameId">-----</span></div>
        <div class="info-item">Wallet <span class="info-value" id="balance">0.00 ETB</span></div>
        <div class="info-item">Stake <span class="info-value" id="currentStake">0</span></div>
        <div class="info-item">Timer <span class="info-value timer-val" id="timer">60s</span></div>
    </div>

    <div class="stake-header">
        <input type="number" id="stakeAmount" value="10" oninput="updateStakeDisplay()">
        <span id="derash-box">ደራሽ: <span id="derashVal">0.00</span> ETB</span>
    </div>

    <div class="grid-container" id="mainGrid"></div>

    <div id="cardModal" class="modal">
        <div class="card-view">
            <div id="cardTitle" style="font-weight: bold; margin-bottom: 5px;">Card No: <span id="activeCardNum">0</span></div>
            <div class="bingo-header">
                <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
            </div>
            <div class="card-grid-small" id="bingoCardCells">
                </div>
            <div class="modal-btns">
                <button class="btn-accept" onclick="confirmCard()">Accept</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeLeft = 60;
        let selectedCards = new Set();
        let lastClickedNum = 0;

        // 1. Game ID - 5 digit random
        document.getElementById('gameId').innerText = Math.floor(10000 + Math.random() * 90000);

        // 2. Timer Logic
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("ጨዋታው እየተጀመረ ነው...");
                // ወደ ጨዋታው መጥሪያ ገጽ ይወስዳል
                window.location.href = "game_call.html"; 
            }
        }, 1000);

        // 3. Grid Generation (1-130)
        const grid = document.getElementById('mainGrid');
        for (let i = 1; i <= 130; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.id = 'btn-' + i;
            btn.innerText = i;
            btn.onclick = () => openCard(i);
            grid.appendChild(btn);
        }

        function openCard(num) {
            lastClickedNum = num;
            document.getElementById('activeCardNum').innerText = num;
            generateBingoCard();
            document.getElementById('cardModal').style.display = 'flex';
        }

        function generateBingoCard() {
            const container = document.getElementById('bingoCardCells');
            container.innerHTML = "";
            // B: 1-15, I: 16-30, N: 31-45, G: 46-60, O: 61-75 (Sample logic)
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (i === 12) {
                    cell.innerHTML = "⭐";
                    cell.className += " star";
                } else {
                    cell.innerText = Math.floor(Math.random() * 75) + 1;
                }
                container.appendChild(cell);
            }
        }

        function confirmCard() {
            selectedCards.add(lastClickedNum);
            document.getElementById('btn-' + lastClickedNum).classList.add('selected');
            updateStakeDisplay();
            closeModal();
        }

        function closeModal() {
            document.getElementById('cardModal').style.display = 'none';
        }

        function updateStakeDisplay() {
            let stake = parseFloat(document.getElementById('stakeAmount').value) || 0;
            document.getElementById('currentStake').innerText = stake;
            let derash = stake * 0.85 * selectedCards.size;
            document.getElementById('derashVal').innerText = derash.toFixed(2);
        }

        // 4. Wallet Balance (ከቦቱ የሚመጣ መረጃ ካለ እዚህ ይገባል)
        // ለጊዜው በናሙና 0.00 ETB ተደርጓል
    </script>
</body>
</html>
