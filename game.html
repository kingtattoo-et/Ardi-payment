<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ardi Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7b1fa2; --secondary: #4a148c; --accent: #ff9800; --bg: #311b92; }
        body { font-family: 'Arial', sans-serif; background: #2c003e; color: white; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }

        .header-top { background: var(--bg); padding: 5px; display: flex; justify-content: space-around; font-size: 0.65rem; border-bottom: 2px solid var(--accent); }
        .stat-box { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 8px; border: 1px solid #00d2ff; min-width: 55px; }
        
        /* Derash & Timer Section - Image 1/3 መሰረት */
        .info-container { display: flex; justify-content: center; gap: 10px; padding: 10px; }
        .derash-box { background: #2e7d32; border: 2px solid #81c784; border-radius: 12px; padding: 10px; width: 140px; }
        .timer-box { background: #4527a0; border: 2px solid #9575cd; border-radius: 12px; padding: 10px; width: 140px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .timer-circle { width: 35px; height: 35px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
        
        .logo-area { margin: 5px auto; width: 50px; height: 50px; background: white; border-radius: 50%; padding: 5px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--accent); }
        .logo-area img { width: 100%; border-radius: 50%; }

        /* ካርቴላ መምረጫ */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; max-height: 55vh; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; margin: 0 10px; }
        .card-select-btn { background: #555; color: #ccc; padding: 10px 2px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; border: 1px solid #777; cursor: pointer; }
        .card-select-btn.available { background: #e67e22; color: white; border: none; box-shadow: 0 3px 0 #d35400; }
        .card-select-btn.purchased { background: #2e7d32 !important; color: white !important; border: 2px solid #afffbc !important; cursor: not-allowed; }

        /* ጨዋታ ገጽ */
        #game-screen { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .bingo-card-container { background: #ffcc80; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 340px; margin: 0 auto; border: 5px solid #ef6c00; }
        .bingo-header-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .letter-box { font-size: 1.4rem; font-weight: 900; padding: 5px; border-radius: 5px; color: white; text-shadow: 1px 1px 2px black; }
        .letter-box.b { background: #4caf50; } .letter-box.i { background: #f44336; } .letter-box.n { background: #ffeb3b; color: #333; } .letter-box.g { background: #2196f3; } .letter-box.o { background: #e91e63; }

        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { background: white; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; color: #333; border-radius: 4px; cursor: pointer; }
        .cell.marked { background: #4caf50 !important; color: white; border: 2px solid white; }
        .cell.free { background: #8bc34a; font-size: 0.55rem; color: white; flex-direction: column; }

        .action-btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .btn-accept { background: #2e7d32; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 0 #1b5e20; }
        .btn-cancel { background: #ef6c00; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 0 #e65100; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <div class="header-top">
            <div class="stat-box">Game<br><b>303397</b></div>
            <div class="stat-box">Bet<br><b>50 ETB</b></div>
            <div class="stat-box">Active<br><b id="active-count">0</b></div>
            <div class="stat-box">Wallet<br><b>0.00</b></div>
        </div>

        <div class="info-container">
            <div class="derash-box">
                <span style="font-size: 0.8rem;">ደራሽ</span><br>
                <b id="derash-amount" style="font-size: 1.2rem;">0 ETB</b>
            </div>
            <div class="timer-box">
                <div class="timer-circle" id="timer-display">60</div>
                <div style="text-align: left; font-size: 0.7rem; line-height: 1;">
                    <b>ታይመር</b><br>Starting On
                </div>
            </div>
        </div>

        <div class="logo-area">
            <img src="https://kingtattoo-et.github.io/Ardi-payment/ardi%20logo.png.png" alt="Logo">
        </div>
        
        <p style="font-size: 0.8rem; margin: 5px; color: #00d2ff;">እባክዎ ካርቴላ ይምረጡ፤ በ 60 ሰከንድ ይጀምራል</p>
        <div class="selection-grid" id="card-list"></div>
    </div>

    <div id="game-screen">
        <h2 style="margin: 5px; color: var(--accent);">Ardi Bingo</h2>
        <div class="bingo-card-container">
            <div class="bingo-header-letters">
                <div class="letter-box b">B</div><div class="letter-box i">I</div>
                <div class="letter-box n">N</div><div class="letter-box g">G</div>
                <div class="letter-box o">O</div>
            </div>
            <div class="bingo-grid" id="board"></div>
        </div>
        <div class="action-btns">
            <button class="btn-accept" onclick="confirmBingo()">Accept</button>
            <button class="btn-cancel" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let stake = 50; // የመጫወቻ ብር
        let purchasedCards = 0;
        let timeLeft = 60;
        let timerStarted = false;

        // ደራሽ ማስያ (Purchased * 0.85 * Stake)
        function updateDerash() {
            let total = purchasedCards * 0.85 * stake;
            document.getElementById('derash-amount').innerText = total.toFixed(0) + " ETB";
            document.getElementById('active-count').innerText = purchasedCards;
        }

        // 130 ካርቴላዎችን መፍጠር
        const cardList = document.getElementById('card-list');
        for (let i = 1; i <= 130; i++) {
            const btn = document.createElement('button');
            btn.className = 'card-select-btn available';
            btn.innerText = i;
            btn.id = 'card-' + i;
            btn.onclick = () => buyCard(i);
            cardList.appendChild(btn);
        }

        function buyCard(num) {
            const btn = document.getElementById('card-' + num);
            if(btn.classList.contains('purchased')) return;

            btn.classList.remove('available');
            btn.classList.add('purchased'); // ወደ አረንጓዴ ይቀየራል
            purchasedCards++;
            updateDerash();
            
            if(!timerStarted) startTimer();

            // የጨዋታ ገጽ ይከፈታል
            setTimeout(() => startGame(num), 500);
        }

        function startTimer() {
            timerStarted = true;
            const timerDiv = document.getElementById('timer-display');
            const countdown = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDiv.innerText = "0";
                    tg.showAlert("ጨዋታ ተጀምሯል!");
                }
            }, 1000);
        }

        function startGame(num) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            createBoard();
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const ranges = [{min:1,max:15},{min:16,max:30},{min:31,max:45},{min:46,max:60},{min:61,max:75}];
            let matrix = [];
            for(let c=0; c<5; c++) {
                let nums = [];
                while(nums.length<5){
                    let r = Math.floor(Math.random()*(ranges[c].max-ranges[c].min+1))+ranges[c].min;
                    if(!nums.includes(r)) nums.push(r);
                }
                matrix.push(nums);
            }

            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const cell = document.createElement('div');
                    if(r===2 && c===2) {
                        cell.className = 'cell free marked';
                        cell.innerHTML = '<i class="fas fa-star"></i>FREE';
                    } else {
                        cell.className = 'cell';
                        cell.innerText = matrix[c][r];
                        cell.onclick = function() {
                            this.classList.toggle('marked');
                            tg.HapticFeedback.impactOccurred('light');
                        };
                    }
                    board.appendChild(cell);
                }
            }
        }

        function confirmBingo() {
            tg.showConfirm("BINGO ማለታችሁን አረጋግጠዋል?", (ok) => {
                if(ok) {
                    tg.sendData("BINGO_WINNER");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
