<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ardi Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #311b92; --accent: #ff9800; --bg: #2c003e; --blue: #00d2ff; --red: #ff5252; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; text-align: center; }
        
        /* Top Balance Bar */
        .balance-header { background: var(--primary); padding: 15px; border-bottom: 2px solid var(--accent); font-weight: bold; font-size: 1.1rem; }
        .balance-header b { color: var(--blue); }

        /* Stake Selection View (Image 1) */
        #stake-view { padding: 20px; }
        .main-title { font-size: 1.5rem; margin: 20px 0; color: white; font-weight: bold; }
        .stake-list { display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .stake-option { background: #4527a0; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .stake-option:active { background: #5e35b1; }
        .stake-option span { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        .select-txt { background: #2e7d32; padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; }

        /* Card Selection View (Image 2) */
        #card-view { display: none; padding: 10px; }
        .game-info-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .info-item { display: flex; flex-direction: column; gap: 5px; }
        .circle { width: 60px; height: 30px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 1px solid white; }
        .blue-c { background: var(--blue); color: black; }
        .red-c { background: var(--red); color: white; }

        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 60vh; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .card-btn { background: #e67e22; color: white; padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; box-shadow: 0 4px 0 #d35400; }
        .card-btn.selected { background: #2e7d32; box-shadow: none; border: 2px solid #afffbc; }

        /* Preview Modal */
        #preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #ffcc80; padding: 20px; border-radius: 20px; width: 85%; max-width: 300px; color: #333; }
        .bingo-preview { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .cell { background: white; aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="balance-header">Balance: <b id="balance-display">0.00</b> ETB</div>

    <div id="stake-view">
        <div class="main-title">በትልቁ መደብ ይምረጡ</div>
        <div class="stake-list">
            <div class="stake-option" onclick="startCardSelection(10)">
                <span>10 Birr</span> <div class="select-txt">ምረጥ</div>
            </div>
            <div class="stake-option" onclick="startCardSelection(20)">
                <span>20 Birr</span> <div class="select-txt">ምረጥ</div>
            </div>
            <div class="stake-option" onclick="startCardSelection(50)">
                <span>50 Birr</span> <div class="select-txt">ምረጥ</div>
            </div>
            <div class="stake-option" onclick="startCardSelection(100)">
                <span>100 Birr</span> <div class="select-txt">ምረጥ</div>
            </div>
        </div>
    </div>

    <div id="card-view">
        <div class="game-info-bar">
            <div class="info-item">
                <span>Timer</span>
                <div class="circle blue-c" id="game-timer">60</div>
            </div>
            <div class="info-item">
                <span>ደራሽ</span>
                <div class="circle red-c" id="derash-display">0</div>
            </div>
        </div>
        <div class="card-grid" id="grid-container"></div>
    </div>

    <div id="preview-modal">
        <div class="modal-box">
            <h3 id="modal-title">ካርቴላ #0</h3>
            <div class="bingo-preview" id="preview-grid"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="buyCard()" style="flex:1; background:#2e7d32; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Accept</button>
                <button onclick="closeModal()" style="flex:1; background:#ef6c00; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);

        let balance = parseFloat(urlParams.get('balance')) || 0.00;
        let selectedStake = 0;
        let timerValue = 60;
        let purchasedCardNum = null;

        document.getElementById('balance-display').innerText = balance.toFixed(2);

        // ወደ Image 2 መሸጋገሪያ
        function startCardSelection(amt) {
            selectedStake = amt;
            document.getElementById('stake-view').style.display = 'none';
            document.getElementById('card-view').style.display = 'block';
            document.getElementById('derash-display').innerText = Math.floor(amt * 0.85);
            
            generateGrid();
            startTimer();
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 150 ካርቴላዎችን መፍጠር
        function generateGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            for(let i=1; i<=150; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.innerText = i;
                btn.id = 'card-' + i;
                btn.onclick = () => openPreview(i);
                container.appendChild(btn);
            }
        }

        function startTimer() {
            const t = setInterval(() => {
                if(timerValue > 0) {
                    timerValue--;
                    document.getElementById('game-timer').innerText = timerValue;
                } else {
                    clearInterval(t);
                    if(purchasedCardNum) {
                        window.location.href = `game_call.html?card=${purchasedCardNum}&stake=${selectedStake}&derash=${Math.floor(selectedStake*0.85)}&balance=${balance}`;
                    } else {
                        tg.showAlert("ካርቴላ አልገዙም!");
                        location.reload();
                    }
                }
            }, 1000);
        }

        let tempNum = 0;
        function openPreview(num) {
            if(purchasedCardNum) return;
            tempNum = num;
            document.getElementById('modal-title').innerText = "ካርቴላ #" + num;
            const pGrid = document.getElementById('preview-grid');
            pGrid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                c.innerText = i === 12 ? "⭐" : Math.floor(Math.random() * 75) + 1;
                pGrid.appendChild(c);
            }
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function buyCard() {
            if(balance >= selectedStake) {
                balance -= selectedStake;
                purchasedCardNum = tempNum;
                document.getElementById('balance-display').innerText = balance.toFixed(2);
                document.getElementById('card-' + tempNum).classList.add('selected');
                closeModal();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("በቂ ሂሳብ የለዎትም!");
            }
        }

        function closeModal() { document.getElementById('preview-modal').style.display = 'none'; }
    </script>
</body>
</html>
