<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ardi Bingo - Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #e94560; --secondary: #0f3460; --bg: #1a1a2e; --accent: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 10px; text-align: center; user-select: none; }
        
        .header { background: linear-gradient(45deg, var(--accent), var(--primary)); padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* ካርቴላ መምረጫ ገጽ */
        .selection-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; max-height: 70vh; overflow-y: auto; }
        .card-btn { background: var(--accent); padding: 15px 5px; border-radius: 10px; border: 1px solid var(--secondary); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .card-btn:active { transform: scale(0.9); background: var(--primary); }

        /* የቢንጎ መጫወቻ ገጽ */
        #game-screen { display: none; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 380px; margin: 0 auto; background: var(--accent); padding: 10px; border-radius: 15px; }
        .cell { background-color: var(--secondary); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .cell.marked { background: var(--primary); border-color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; width: 85%; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-back { background: #555; width: 60%; padding: 10px; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <div class="header">
            <h2>🎰 ARDI BINGO 🎰</h2>
            <p>እባክዎ አንድ ካርቴላ ይምረጡ</p>
        </div>
        <div class="selection-grid" id="card-list">
            </div>
    </div>

    <div id="game-screen">
        <div class="header">
            <h2 id="current-card-title">ካርቴላ #</h2>
            <p>ቁጥሮችን በመንካት ያቅልሙ</p>
        </div>

        <div class="bingo-grid" id="board">
            </div>

        <div class="controls">
            <button class="btn" onclick="claimBingo()">BINGO! (አሸነፍኩ)</button>
            <button class="btn btn-back" onclick="location.reload()">ተመለስ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 100 ካርቴላዎችን ዝርዝር መፍጠር
        const cardList = document.getElementById('card-list');
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('div');
            btn.className = 'card-btn';
            btn.innerText = i;
            btn.onclick = () => startGame(i);
            cardList.appendChild(btn);
        }

        function startGame(num) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('current-card-title').innerText = "ካርቴላ #" + num;
            createBoard();
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // 1-75 ወይም 1-100 ያሉ 25 የተለያዩ ቁጥሮች ማመንጫ
            const numbers = [];
            while(numbers.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!numbers.includes(r)) numbers.push(r);
            }

            numbers.forEach(n => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = n;
                cell.onclick = function() {
                    this.classList.toggle('marked');
                    tg.HapticFeedback.impactOccurred('light');
                };
                board.appendChild(cell);
            });
        }

        function claimBingo() {
            tg.showConfirm("ቢንጎ ማለታችሁ ተመዝግቧል። ሲስተሙ ካረጋገጠ በኋላ ክፍያ ይፈጸማል?", (ok) => {
                if(ok) {
                    tg.sendData("BINGO_CLAIMED");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
