<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ardi Bingo - Stake Selection</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #311b92; --accent: #ff9800; --bg: #2c003e; --blue-timer: #00d2ff; --red-win: #ff5252; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        .header-top { background: var(--primary); padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; border: 1px solid var(--blue-timer); }

        /* Stake List Styles (Image 1) */
        .stake-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .stake-card { background: #4527a0; border-radius: 15px; padding: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
        .stake-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .stake-amt { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        
        /* Circles for Win and Timer */
        .indicator-row { display: flex; gap: 8px; margin-top: 5px; }
        .circle-win { background: var(--red-win); width: 50px; height: 25px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; border: 1px solid white; }
        .circle-timer { background: var(--blue-timer); width: 45px; height: 25px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; border: 1px solid white; color: black; }

        .join-btn { background: #2e7d32; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1b5e20; }
        .join-btn:active { transform: translateY(2px); box-shadow: none; }

        /* Card Selection (Image 2 & 3) */
        #card-selection-section { display: none; padding: 10px; animation: fadeIn 0.4s; }
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; max-height: 50vh; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; }
        .card-num-btn { background: #e67e22; color: white; padding: 15px 5px; border-radius: 8px; font-weight: bold; border: none; font-size: 1rem; box-shadow: 0 4px 0 #d35400; }
        .card-num-btn.purchased { background: #2e7d32 !important; border: 2px solid #afffbc !important; box-shadow: none; }

        /* Preview Modal (Image 3) */
        #preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .preview-content { background: #ffcc80; padding: 20px; border-radius: 20px; width: 85%; max-width: 300px; border: 6px solid #ef6c00; }
        .bingo-preview-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .p-cell { background: white; aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; font-size: 0.9rem; }
        .p-cell.star { background: #4caf50; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header-top">
            <div class="stat-box">Balance: <b id="wallet-bal">0.00</b></div>
            <div class="stat-box">ID: <b id="game-id">--</b></div>
        </div>

        <div class="stake-container" id="stake-view">
            <h2 style="font-size: 1.1rem; color: var(--blue-timer);">Stake ይምረጡ</h2>
            
            <div class="stake-card">
                <div class="stake-info">
                    <span class="stake-amt">10 ETB</span>
                    <div class="indicator-row">
                        <div class="circle-win">8.5 ETB</div>
                        <div class="circle-timer" id="timer-10">60</div>
                    </div>
                </div>
                <button class="join-btn" onclick="goToCards(10, 60)">Join</button>
            </div>

            <div class="stake-card">
                <div class="stake-info">
                    <span class="stake-amt">20 ETB</span>
                    <div class="indicator-row">
                        <div class="circle-win">17 ETB</div>
                        <div class="circle-timer" id="timer-20">45</div>
                    </div>
                </div>
                <button class="join-btn" onclick="goToCards(20, 45)">Join</button>
            </div>

            <div class="stake-card">
                <div class="stake-info">
                    <span class="stake-amt">50 ETB</span>
                    <div class="indicator-row">
                        <div class="circle-win">42.5 ETB</div>
                        <div class="circle-timer" id="timer-50">30</div>
                    </div>
                </div>
                <button class="join-btn" onclick="goToCards(50, 30)">Join</button>
            </div>

            <div class="stake-card">
                <div class="stake-info">
                    <span class="stake-amt">100 ETB</span>
                    <div class="indicator-row">
                        <div class="circle-win">85 ETB</div>
                        <div class="circle-timer" id="timer-100">20</div>
                    </div>
                </div>
                <button class="join-btn" onclick="goToCards(100, 20)">Join</button>
            </div>
        </div>

        <div id="card-selection-section">
            <div style="padding: 10px; background: var(--primary); margin-bottom: 10px;">
                <span id="active-timer" class="circle-timer" style="display:inline-flex; width: 60px;">0</span>
                <b style="margin-left: 10px;">ካርቴላ ይምረጡ (<span id="active-stake">0</span> ETB)</b>
            </div>
            <div class="selection-grid" id="card-grid"></div>
        </div>
    </div>

    <div id="preview-modal">
        <div class="preview-content">
            <h3 style="color: #333; margin: 0;">ካርቴላ #<span id="target-card">0</span></h3>
            <div class="bingo-preview-grid" id="preview-grid"></div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button onclick="buyCard()" style="flex:1; background:#2e7d32; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Accept</button>
                <button onclick="closePreview()" style="flex:1; background:#ef6c00; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);

        let currentBalance = parseFloat(urlParams.get('balance')) || 0.00;
        let selectedStake = 0;
        let mainTimer = 0;
        let purchasedCard = null;
        let timerActive = false;

        document.getElementById('wallet-bal').innerText = currentBalance.toFixed(2);
        document.getElementById('game-id').innerText = Math.floor(Math.random()*90000);

        // 1. Go to Card Selection
        function goToCards(amt, time) {
            selectedStake = amt;
            mainTimer = time;
            document.getElementById('stake-view').style.display = 'none';
            document.getElementById('card-selection-section').style.display = 'block';
            document.getElementById('active-stake').innerText = amt;
            document.getElementById('active-timer').innerText = time;
            
            if(!timerActive) startCountdown();
            generateCardGrid();
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 2. Timer Logic
        function startCountdown() {
            timerActive = true;
            const tLoop = setInterval(() => {
                if(mainTimer > 0) {
                    mainTimer--;
                    document.getElementById('active-timer').innerText = mainTimer;
                    // Update main list timers too
                    const tDisplay = document.getElementById('timer-' + selectedStake);
                    if(tDisplay) tDisplay.innerText = mainTimer;
                } else {
                    clearInterval(tLoop);
                    if(purchasedCard) {
                        const win = Math.floor(selectedStake * 0.85);
                        window.location.href = `game_call.html?card=${purchasedCard}&stake=${selectedStake}&derash=${win}&balance=${currentBalance}`;
                    } else {
                        tg.showAlert("ጨዋታው ተጀምሯል! ካርቴላ ስላልገዙ ማለፍ አይችሉም።");
                        location.reload();
                    }
                }
            }, 1000);
        }

        // 3. Grid Generation
        function generateCardGrid() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            for(let i=1; i<=130; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-num-btn';
                btn.innerText = i;
                btn.id = 'card-' + i;
                btn.onclick = () => openPreview(i);
                grid.appendChild(btn);
            }
        }

        // 4. Preview (Image 3)
        let tempCard = null;
        function openPreview(num) {
            if(purchasedCard) return;
            tempCard = num;
            document.getElementById('target-card').innerText = num;
            const pGrid = document.getElementById('preview-grid');
            pGrid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const d = document.createElement('div');
                d.className = 'p-cell' + (i===12 ? ' star' : '');
                d.innerText = i===12 ? '⭐' : Math.floor(Math.random()*75)+1;
                pGrid.appendChild(d);
            }
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function buyCard() {
            if(currentBalance >= selectedStake) {
                currentBalance -= selectedStake;
                purchasedCard = tempCard;
                document.getElementById('wallet-bal').innerText = currentBalance.toFixed(2);
                document.getElementById('card-' + tempCard).classList.add('purchased');
                closePreview();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("በቂ ሂሳብ የለዎትም!");
            }
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }
    </script>
</body>
</html>
