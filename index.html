<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function openDeposit(bank, number) {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('deposit-panel').style.display = 'block';
        document.getElementById('display-bank').innerText = bank;
        
        if(bank === 'CBE Bank') {
            document.getElementById('acc-number').innerText = '1000277987067';
        } else {
            document.getElementById('acc-number').innerText = '251979429028';
        }
        document.getElementById('acc-label').innerText = (bank === 'CBE Bank') ? "ACCOUNT NUMBER" : "PHONE NUMBER";
    }

    function goBack() {
        document.getElementById('selection-screen').style.display = 'block';
        document.getElementById('deposit-panel').style.display = 'none';
    }

    // መረጃውን ወደ ቦቱ የሚልከው ዋናው ክፍል
    function sendToAdmin() {
        const sms = document.getElementById('sms-input').value;
        const bank = document.getElementById('display-bank').innerText;
        
        if(sms.trim().length < 5) {
            tg.showAlert("እባክዎ ትክክለኛ የSMS መረጃ ያስገኑ!");
            return;
        }

        // ዳታውን በ JSON መልክ እናዘጋጃለን
        const data = {
            bank: bank,
            message: sms
        };
        
        // ይህ ትዕዛዝ ዳታውን ወደ ቦቱ ይልካል
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>
