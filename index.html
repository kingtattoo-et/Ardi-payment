<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Deposit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #27ae60; --secondary-color: #2c3e50; --bg-color: #f4f7f6; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--secondary-color); color: white; padding: 20px; text-align: center; }
        .header img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; }
        .content { padding: 20px; }
        .bank-item { display: flex; align-items: center; padding: 15px; border: 1px solid #ddd; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .bank-item:hover { border-color: var(--primary-color); background: #f9f9f9; }
        .bank-item img { width: 45px; height: 45px; margin-right: 15px; object-fit: contain; }
        .bank-info b { display: block; color: var(--secondary-color); font-size: 1.1rem; }
        .deposit-panel { display: none; text-align: center; }
        .acc-box { background: #f8fafc; border: 2px dashed var(--primary-color); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        textarea { width: 100%; height: 100px; border-radius: 10px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; margin-bottom: 15px; }
        .btn-main { background: var(--primary-color); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-back { background: none; border: none; color: #888; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <img src="https://kingtattoo-et.github.io/Ardi-payment/ardi%20logo.png.png">
        <h2>Manual Deposit</h2>
    </div>
    <div class="content">
        <div id="selectionPage">
            <p style="text-align:center; color:#666;">ለመቀጠል ባንክ ይምረጡ</p>
            <div class="bank-item" onclick="openDeposit('CBE Bank', '1000277987067')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Commercial_Bank_of_Ethiopia_logo.png/220px-Commercial_Bank_of_Ethiopia_logo.png">
                <div class="bank-info"><b>CBE Bank</b></div>
            </div>
            <div class="bank-item" onclick="openDeposit('CBE Birr', '0979429028')">
                <img src="https://kingtattoo-et.github.io/Ardi-payment/cbebirr.png">
                <div class="bank-info"><b>CBE Birr</b></div>
            </div>
            <div class="bank-item" onclick="openDeposit('Telebirr', '0979429028')">
                <img src="https://kingtattoo-et.github.io/Ardi-payment/telebirr.png">
                <div class="bank-info"><b>Telebirr</b></div>
            </div>
        </div>
        <div id="depositPage" class="deposit-panel">
            <button class="btn-back" onclick="location.reload()"><i class="fas fa-arrow-left"></i> ተመለስ</button>
            <div class="acc-box">
                <small>ACCOUNT NAME: <b>Yordanos</b></small>
                <h3 id="accNumber" style="color:var(--primary-color); margin:10px 0;"></h3>
            </div>
            <textarea id="smsInput" placeholder="የባንክ SMS እዚህ ጋር ፔስት ያድርጉ..."></textarea>
            <button class="btn-main" onclick="sendToBot()">Send for Verification</button>
        </div>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let currentBank = "";
    function openDeposit(bank, acc) {
        currentBank = bank;
        document.getElementById('selectionPage').style.display = 'none';
        document.getElementById('depositPage').style.display = 'block';
        document.getElementById('accNumber').innerText = acc;
    }
    function sendToBot() {
        const sms = document.getElementById('smsInput').value.trim();
        if (sms.length < 5) return alert("SMS ያስገቡ!");
        tg.sendData(JSON.stringify({ bank: currentBank, message: sms }));
        tg.close();
    }
</script>
</body>
</html>
