<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Deposit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* Image 5 style headers */
        .main-logo { width: 60px; margin-bottom: 10px; }
        .header { color: #8e44ad; font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        .sub-header { font-size: 13px; color: #333; margin-bottom: 20px; font-weight: 600; }

        /* Bank Selection Grid (Image 2 style) */
        .bank-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .bank-card { border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .bank-card:hover { border-color: #8e44ad; background: #f9f0ff; }
        .bank-card img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }
        .bank-card div { font-size: 11px; font-weight: bold; }

        /* Deposit Panel (Image 1, 3 style) */
        #deposit-panel { display: none; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
        .status-bar { background: #8e44ad; color: white; padding: 8px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; position: relative; }
        .close-btn { position: absolute; right: 10px; cursor: pointer; }
        
        .account-info { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #ccc; }
        .info-row { margin-bottom: 10px; }
        .label { font-size: 12px; color: #666; display: block; }
        .value { font-size: 18px; font-weight: 800; color: #2c3e50; }
        .copy-icon { font-size: 14px; margin-left: 5px; cursor: pointer; color: #8e44ad; }

        .instruction { font-size: 13px; text-align: left; background: #fff9e6; padding: 10px; border-left: 4px solid #f1c40f; margin-bottom: 15px; line-height: 1.5; }
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 15px; }
        
        .verify-btn { background: #2ecc71; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .support-link { display: block; margin-top: 15px; font-size: 12px; color: #3498db; text-decoration: none; }
        .footer { font-size: 10px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="selection-screen">
        <img src="logo.png" class="main-logo" alt="Logo"> <div class="header">Manual Deposit</div>
        <div class="sub-header">Select your bank to deposit funds</div>

        <div class="bank-grid">
            <div class="bank-card" onclick="openDeposit('CBE Bank', '1000277987067')">
                <img src="cbe.png" alt="CBE">
                <div>CBE Bank</div>
            </div>
            <div class="bank-card" onclick="openDeposit('CBE Birr', '0979429028')">
                <img src="cbebirr.png" alt="CBE Birr">
                <div>CBE Birr</div>
            </div>
            <div class="bank-card" onclick="openDeposit('Telebirr', '0979429028')">
                <img src="telebirr.png" alt="Telebirr">
                <div>Telebirr</div>
            </div>
        </div>
        <div class="footer">Copyright © Allora-Groups 2025</div>
    </div>

    <div id="deposit-panel">
        <div class="status-bar">
            <span id="display-bank">Bank</span> 50 BIRR Deposit
            <span class="close-btn" onclick="goBack()">✕</span>
        </div>

        <div class="account-info">
            <div class="info-row">
                <span class="label">ACCOUNT NAME</span>
                <span class="value">YORDANOS</span>
            </div>
            <div class="info-row">
                <span class="label" id="acc-label">NUMBER</span>
                <span class="value" id="acc-number">0979429028</span>
            </div>
        </div>

        <div class="instruction">
            1. ከላይ ባለው ቁጥር ብር ያስገቡ<br>
            2. የደረሳችሁን የጽሁፍ መልዕክት (SMS) ሙሉውን ኮፒ በማድረግ ከታች ባለው ሳጥን ላይ ፔስት አድርገው ይላኩ።
        </div>

        <textarea id="sms-input" placeholder="የባንክ SMS እዚህ ጋር ፔስት ያድርጉ..."></textarea>
        
        <button class="verify-btn" onclick="sendToAdmin()">Send for Verification</button>
        
        <a href="https://t.me/cartelabingo_support" class="support-link">@cartelabingo_support Support</a>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function openDeposit(bank, number) {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('deposit-panel').style.display = 'block';
        document.getElementById('display-bank').innerText = bank;
        document.getElementById('acc-number').innerText = number;
        
        // Change label based on type
        document.getElementById('acc-label').innerText = (bank === 'CBE Bank') ? "ACCOUNT NUMBER" : "PHONE NUMBER";
    }

    function goBack() {
        document.getElementById('selection-screen').style.display = 'block';
        document.getElementById('deposit-panel').style.display = 'none';
    }

    function sendToAdmin() {
        const sms = document.getElementById('sms-input').value;
        const bank = document.getElementById('display-bank').innerText;
        
        if(sms.trim().length < 10) {
            tg.showAlert("እባክዎ ትክክለኛ የSMS መረጃ ያስገቡ!");
            return;
        }

        const data = {
            bank: bank,
            message: sms
        };
        
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
