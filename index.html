<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Deposit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bank-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; background: #fff; }
        .bank-card:hover { border-color: #8e44ad; }
        textarea { width: 100%; height: 100px; border-radius: 10px; padding: 10px; margin: 15px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .verify-btn { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div id="selection">
        <h3>ባንክ ይምረጡ</h3>
        <div class="bank-card" onclick="openDep('CBE Bank', '1000277987067')">CBE Bank (Yordanos)</div>
        <div class="bank-card" onclick="openDep('Telebirr', '0979429028')">Telebirr (Yordanos)</div>
    </div>
    <div id="panel" style="display:none;">
        <h4 id="bankName"></h4>
        <p>ቁጥር: <b id="bankAcc"></b></p>
        <textarea id="smsIn" placeholder="የባንክ SMS እዚህ ጋር ፔስት (Paste) ያድርጉ..."></textarea>
        <button class="verify-btn" onclick="send()">Send for Verification</button>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedBank = "";

    function openDep(b, n) {
        selectedBank = b;
        document.getElementById('selection').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        document.getElementById('bankName').innerText = b;
        document.getElementById('bankAcc').innerText = n;
    }

    function send() {
        const sms = document.getElementById('smsIn').value;
        if(sms.trim().length < 5) {
            tg.showAlert("እባክዎ የባንክ SMS በትክክል ያስገቡ!");
            return;
        }
        // መረጃውን ለቦቱ መላክ
        tg.sendData(JSON.stringify({ bank: selectedBank, message: sms }));
        tg.close();
    }
</script>
</body>
</html>
